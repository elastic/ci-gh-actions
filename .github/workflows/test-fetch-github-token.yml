name: test-fetch-github-token
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - id: fetch-github-token
        uses: ./fetch-github-token
        with:
          vault-instance: "ci-prod"

      - name: Read README.md from elastic/vault-realizer
        env:
          GITHUB_TOKEN: ${{ steps.fetch-github-token.outputs.token }}
        run: |
          curl -H "Authorization: token $GITHUB_TOKEN" \
               -H "Accept: application/vnd.github.v3.raw" \
               https://api.github.com/repos/elastic/vault-realizer/contents/README.md
