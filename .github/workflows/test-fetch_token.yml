name: test-fetch_token
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - './fetch-github-token/**'
      - '.github/workflows/test-fetch_token.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
      - uses: ./fetch-github-token
        with:
          vault-instance: "ci-prod"
