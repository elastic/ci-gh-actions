name: Get Ephemeral GitHub Token from CI Vault
description: 'Fetch an ephemeral GitHub token from Vault using OIDC authentication'
inputs:
  vault-instance:
    description: 'Vault instance to connect to (ci-prod or ci-dev)'
    required: true
  vault-role:
    description: 'Vault role to assume for GitHub token retrieval. If not provided, it will be generated based on the workflow ref of the GH Action. IMPORTANT: This must be used when providing a wildcard in the filename on the workflow_ref of the TokenPolicy resource.'
    required: false
    default: ''
  skip-token-revoke:
    description: 'If true, skip revoking the GitHub token on exit. If false, revocation runs only when Vault issued a lease for the secret read (non-empty lease_id); an empty lease_id means the token is cached and revocation is skipped so other consumer workflows that might rely on it do not break. In that case a workflow notice explains that revocation was skipped.'
    required: false
    default: 'true'
outputs:
  token:
    description: GitHub App installation access token.
    value: ${{ steps.vault-action.outputs.token }}

runs:
  using: "composite"
  steps:
    - name: Set Vault Address
      shell: bash
      id: vault-address
      env:
        VAULT_INSTANCE: ${{ inputs.vault-instance }}
      run: |
        set -euo pipefail

        if [[ "$VAULT_INSTANCE" == "ci-dev" ]]; then
          echo "url=https://vault-ci.dev.elastic.dev" >> "$GITHUB_OUTPUT"
          echo "Vault address set to CI-DEV."
        elif [[ "$VAULT_INSTANCE" == "ci-prod" ]]; then
          echo "url=https://vault-ci-prod.elastic.dev" >> "$GITHUB_OUTPUT"
          echo "Vault address set to CI-PROD."
        else
          echo "::error title=Input Validation Failed::Invalid vault instance: $VAULT_INSTANCE. Must be 'ci-dev' or 'ci-prod'."
          exit 1
        fi

    - name: Retrieve GitHub Workflow Ref and generate Vault Role name (vault-role input overrides this if provided)
      shell: bash
      id: vault-role
      if: ${{ inputs.vault-role == '' }}
      run: |
        set -euo pipefail

        echo "Workflow ref: $GITHUB_WORKFLOW_REF"
        WORKFLOW_REF_BASE="${GITHUB_WORKFLOW_REF%@*}"
        echo "Workflow ref base for role generation: $WORKFLOW_REF_BASE"
        # Generate role name using SHA-256 hash of workflow ref base, checks if sha256sum is available, if not, it uses shasum
        if command -v sha256sum >/dev/null 2>&1; then
          WORKFLOW_HASH=$(echo -n "$WORKFLOW_REF_BASE" | sha256sum | cut -c1-12)
        else
          WORKFLOW_HASH=$(echo -n "$WORKFLOW_REF_BASE" | shasum -a 256 | awk '{print $1}' | cut -c1-12)
        fi
        VAULT_ROLE="token-policy-$WORKFLOW_HASH"
        echo "Generated role name: $VAULT_ROLE"
        echo "role=$VAULT_ROLE" >> "$GITHUB_OUTPUT"

    - name: "Diagnostic: Log Final Vault Parameters"
      shell: bash
      env:
        VAULT_ADDR: ${{ steps.vault-address.outputs.url }}
        VAULT_ROLE: ${{ inputs.vault-role == '' && steps.vault-role.outputs.role || inputs.vault-role }}
      run: |
        echo "--- Vault Action Input Parameters ---"
        echo "VAULT_ADDR (URL): $VAULT_ADDR"
        echo "VAULT_ROLE: $VAULT_ROLE"
        echo "Vault Secrets Path Expected: github/token/$VAULT_ROLE"
        echo "-------------------------------------"

    - name: Verify GitHub OIDC (id-token) is available
      shell: bash
      run: |
        set -euo pipefail
        if [[ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" || -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]]; then
          echo "::error title=Missing id-token permission::GitHub did not expose the OIDC token endpoint for this job. Add job permissions so Actions can mint an OIDC JWT:%0A%0Apermissions:%0A  id-token: write%0A%0ASee https://docs.github.com/en/actions/deployment/security-hardening-your-deployments/about-security-hardening-with-openid-connect#adding-permissions-settings"
          exit 1
        fi

    - name: Install Vault CLI
      shell: bash
      # This matches the current CI Vault version
      env:
        VAULT_VERSION: "1.20.4"
      run: |
        OS=$(uname | tr '[:upper:]' '[:lower:]')
        ARCH=$(uname -m)

        # Map architecture names to HashiCorp's naming
        case "$ARCH" in
          x86_64) VAULT_ARCH="amd64" ;;
          arm64|aarch64) VAULT_ARCH="arm64" ;;
          *)
            echo "::error title=Unsupported architecture::Architecture $ARCH is not supported"
            exit 1
            ;;
        esac

        # Map OS names to HashiCorp's naming
        case "$OS" in
          linux)
            VAULT_OS="linux"
            ;;
          darwin)
            VAULT_OS="darwin"
            ;;
          *)
            echo "::error title=Unsupported OS::Operating system $OS is not supported"
            exit 1
            ;;
        esac
        echo "Detected OS: $OS, Architecture: $ARCH, using Vault binary for: ${VAULT_OS}_${VAULT_ARCH}"
        VAULT_PATH=$RUNNER_TEMP/vault
        mkdir -p "$VAULT_PATH"
        curl -fsSL "https://releases.hashicorp.com/vault/${VAULT_VERSION}/vault_${VAULT_VERSION}_${VAULT_OS}_${VAULT_ARCH}.zip" -o $VAULT_PATH/vault.zip
        cd "$VAULT_PATH"
        unzip vault.zip && rm vault.zip
        chmod +x vault
        ./vault --version
        echo "$VAULT_PATH" >> "$GITHUB_PATH"

    - name: Request OIDC Token from GitHub
      shell: bash
      run: |
        set -euo pipefail
        OIDC_TOKEN=$(curl -s --max-time 10 \
          -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
          "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=vault" | jq -r '.value') || true
        if [[ -z "$OIDC_TOKEN" || "$OIDC_TOKEN" == "null" ]]; then
          echo "::error title=OIDC token request failed::Could not obtain an OIDC JWT from GitHub. Ensure the job has permissions.id-token: write and that this repository allows OIDC (same as other official OIDC actions). https://docs.github.com/en/actions/deployment/security-hardening-your-deployments/about-security-hardening-with-openid-connect#adding-permissions-settings"
          exit 1
        fi
        echo "OIDC_TOKEN=$OIDC_TOKEN" >> "$GITHUB_ENV"

    - name: Fetch GitHub Token from Vault with Retry
      id: vault-action
      shell: bash
      env:
        VAULT_ADDR: ${{ steps.vault-address.outputs.url }}
        VAULT_ROLE: ${{ inputs.vault-role == '' && steps.vault-role.outputs.role || inputs.vault-role }}
        VAULT_CLIENT_TIMEOUT: "10" # seconds
      run: |
        set -euo pipefail

        GITHUB_TOKEN=""
        HAS_VAULT_LEASE=false
        MAX_RETRIES=5
        for i in $(seq 1 $MAX_RETRIES); do
          echo "::group::Attempt $i/$MAX_RETRIES"

          LOGIN_RESPONSE=$(curl -s --max-time 15 --request POST \
            --data '{"jwt": "'"$OIDC_TOKEN"'", "role": "'"$VAULT_ROLE"'"}' \
            "$VAULT_ADDR/v1/auth/github-oidc/login") || true

          VAULT_TOKEN=$(echo "$LOGIN_RESPONSE" | jq -r '.auth.client_token') || true
          export VAULT_TOKEN

          if [[ -z "$VAULT_TOKEN" || "$VAULT_TOKEN" == "null" ]]; then
            ERRORS=$(echo "$LOGIN_RESPONSE" | jq -r '.errors // empty') || true
            echo "::warning::Vault login failed — token is empty/null. Errors: $ERRORS"
            echo "::endgroup::"
            # Exponential backoff with jitter to avoid thundering herd on concurrent retries
            [[ "$i" -lt "$MAX_RETRIES" ]] && sleep $(( 3 + 2 ** i + RANDOM % 3 ))
            continue
          fi

          READ_JSON=""
          if READ_JSON=$(vault read -format=json "github/token/$VAULT_ROLE" 2>/dev/null); then
            GITHUB_TOKEN=$(echo "$READ_JSON" | jq -r '.data.token // empty')
            if [[ -n "$GITHUB_TOKEN" ]]; then
              LEASE_ID=$(echo "$READ_JSON" | jq -r '.lease_id // empty')
              if [[ -n "$LEASE_ID" ]]; then
                HAS_VAULT_LEASE=true
              fi
            fi
            echo "::endgroup::"
            echo "token=$GITHUB_TOKEN" >> "$GITHUB_OUTPUT"
            echo "has-vault-lease=$HAS_VAULT_LEASE" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::warning::vault read failed on attempt $i"
          echo "::endgroup::"
          # Exponential backoff with jitter to avoid thundering herd on concurrent retries
          [[ "$i" -lt "$MAX_RETRIES" ]] && sleep $(( 3 + 2 ** i + RANDOM % 3 ))
        done

        echo "::error title=Vault Token Fetch Failed::All $MAX_RETRIES retry attempts exhausted"
        exit 1

    - name: Token status check
      shell: bash
      run: gh auth status
      env:
        GH_TOKEN: ${{ steps.vault-action.outputs.token }}

    - name: Skipped token revocation (no Vault lease / cached token)
      if: ${{ inputs.skip-token-revoke != 'true' && steps.vault-action.outputs.has-vault-lease != 'true' && steps.vault-action.outputs.token != '' }}
      shell: bash
      run: |
        echo "::notice title=fetch-github-token::Not revoking the GitHub installation token: Vault did not issue a lease (empty lease_id). This means the token is cached, revoking it would mean the cache would contain an invalid token for the rest of the cache TTL, breaking this way other consumers' workflows that might rely on it."

    - name: Revoke GitHub Token on Exit
      if: ${{ inputs.skip-token-revoke != 'true' && steps.vault-action.outputs.has-vault-lease == 'true' }}
      uses: elastic/ci-gh-actions/with-post-step@v1
      with:
        main: echo "EPHEMERAL_TOKEN=${{ steps.vault-action.outputs.token }}" >> "$GITHUB_STATE"
        post: node ${{ github.action_path }}/dist/index.cjs
